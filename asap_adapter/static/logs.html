<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>系统日志 — ASAP Adapter</title>
<link rel="stylesheet" href="/static/common.css">
<script src="/static/common.js"></script>
<style>
  .log-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .log-panel { background: var(--card-bg); border-radius: 12px; padding: 12px; display: flex; flex-direction: column; }
  .log-panel-title { font-size: 13px; font-weight: 600; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
  .log-scroll { flex: 1; overflow-y: auto; font-size: 11px; font-family: 'SF Mono','Fira Code',monospace; }
  .log-full .log-scroll { max-height: 300px; }
  .log-grid .log-scroll { max-height: 420px; }

  /* ── 气泡 ── */
  .bubble { margin: 6px 0; padding: 8px 10px; border-radius: 10px; position: relative; transition: background .2s; }
  .bubble:hover { filter: brightness(1.05); }
  .bubble-head { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; flex-wrap: wrap; }
  .bubble-time { font-size: 9px; opacity: .7; white-space: nowrap; }
  .bubble-tag { font-size: 9px; padding: 1px 6px; border-radius: 4px; font-weight: 600; }
  .bubble-method { font-size: 9px; opacity: .7; }
  .bubble-ep { font-size: 10px; font-weight: 500; word-break: break-all; }
  .bubble-status { font-size: 9px; margin-left: auto; }

  .bubble-body { display: flex; gap: 6px; flex-wrap: wrap; }
  .bubble-section { flex: 1; min-width: 140px; }
  .bubble-label { font-size: 8px; text-transform: uppercase; opacity: .5; margin-bottom: 2px; }
  .bubble-json { font-size: 10px; background: rgba(0,0,0,.3); border-radius: 6px; padding: 4px 6px; max-height: 80px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; line-height: 1.4; }

  /* ── 配色 ── */
  .bubble.rcs { background: rgba(255,140,0,.12); border: 1px solid rgba(255,140,0,.25); }
  .bubble-tag.rcs { background: rgba(255,140,0,.3); color: #ff8c00; }
  .bubble.acs { background: rgba(70,130,255,.12); border: 1px solid rgba(70,130,255,.25); }
  .bubble-tag.acs { background: rgba(70,130,255,.3); color: #4a90ff; }
  .bubble.zone { background: rgba(0,200,120,.12); border: 1px solid rgba(0,200,120,.25); }
  .bubble-tag.zone { background: rgba(0,200,120,.3); color: #00c878; }
  .bubble.system { background: rgba(150,150,150,.08); border: 1px solid rgba(150,150,150,.15); }
  .bubble-tag.system { background: rgba(150,150,150,.2); color: #999; }
</style>
</head>
<body>
<div id="jsErrorBar" style="display:none;background:var(--danger);color:#fff;padding:8px 16px;font-size:12px;text-align:center;position:sticky;top:0;z-index:9999;" onclick="this.style.display='none'"></div>

<div class="app-container">
  <header class="header">
    <div style="display:flex;align-items:center;gap:16px;">
      <h1>📋 ASAP Adapter</h1>
      <nav style="display:flex;gap:4px;">
        <a href="/" class="nav-tab">🚪 风淋门</a>
        <a href="/zone" class="nav-tab">📡 区域管控</a>
        <a href="/config" class="nav-tab">⚙ 配置</a>
        <a href="/upgrade" class="nav-tab">⬆ 升级</a>
        <a href="/sim" class="nav-tab">🎮 模拟器</a>
        <a href="/logs" class="nav-tab nav-tab-active">📋 日志</a>
      </nav>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="header-badge"><span class="status-dot online"></span><span id="connStatus">已连接</span></div>
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>
    </div>
  </header>

  <div class="dashboard">
    <!-- ══ 控制栏 ══ -->
    <div class="glass" style="display:flex;align-items:center;justify-content:space-between;padding:6px 12px;">
      <div style="display:flex;align-items:center;gap:10px;">
        <span style="font-size:12px;font-weight:600;">📋 全量日志</span>
        <span style="font-size:10px;color:var(--text-muted);" id="logTotal">--</span>
        <span style="font-size:8px;color:rgba(255,140,0,.8);">■ RCS</span>
        <span style="font-size:8px;color:rgba(70,130,255,.8);">■ ACS</span>
        <span style="font-size:8px;color:rgba(0,200,120,.8);">■ Zone</span>
        <span style="font-size:8px;color:rgba(150,150,150,.8);">■ System</span>
      </div>
      <div style="display:flex;gap:6px;align-items:center;">
        <label style="font-size:10px;cursor:pointer;display:flex;align-items:center;gap:4px;">
          <input type="checkbox" id="logAutoScroll" checked> 自动
        </label>
        <button class="btn btn-sm" onclick="scrollAllBottom()">⬇ 底部</button>
      </div>
    </div>

    <!-- ══ RCS vs ACS ══ -->
    <div class="log-grid">
      <div class="log-panel">
        <div class="log-panel-title"><span style="color:#ff8c00;">🔺 RCS 上游</span><span style="font-size:9px;color:var(--text-muted);" id="rcsCount">0条</span></div>
        <div class="log-scroll" id="rcsPanel"></div>
      </div>
      <div class="log-panel">
        <div class="log-panel-title"><span style="color:#4a90ff;">🔻 ACS+Zone 下游</span><span style="font-size:9px;color:var(--text-muted);" id="acsCount">0条</span></div>
        <div class="log-scroll" id="acsPanel"></div>
      </div>
    </div>

    <!-- ══ System ══ -->
    <div class="log-panel log-full">
      <div class="log-panel-title"><span style="color:#999;">⚙ System 内部</span><span style="font-size:9px;color:var(--text-muted);" id="sysCount">0条</span></div>
      <div class="log-scroll" id="sysPanel" style="max-height:200px;"></div>
    </div>
  </div>
</div>

<script>
let _entries = [];

function init() { initTheme(); initNav("/logs"); setInterval(poll, 2000); poll(); }

async function poll() {
  try {
    const r = await fetch("/api/asap/logs?limit=200&source=all");
    const d = await r.json();
    const logs = d.logs || [];
    document.getElementById("logTotal").textContent = "共" + d.total + "条";
    if (logs.length === _entries.length && _entries.length > 0) return;
    _entries = logs;
    renderAll(logs);
  } catch (e) {}
}

function renderAll(logs) {
  const rcs = [], acs = [], sys = [];
  logs.forEach(l => {
    if (l.source === "rcs") rcs.push(l);
    else if (l.source === "acs" || l.source === "zone") acs.push(l);
    else sys.push(l);
  });
  renderBubbles("rcsPanel", rcs, "rcs");
  renderBubbles("acsPanel", acs, l => l.source || "acs");
  renderBubbles("sysPanel", sys, "system");
  document.getElementById("rcsCount").textContent = rcs.length + "条";
  document.getElementById("acsCount").textContent = acs.length + "条";
  document.getElementById("sysCount").textContent = sys.length + "条";
  if (document.getElementById("logAutoScroll")?.checked) scrollAllBottom();
}

function renderBubbles(id, entries, cssOrFn) {
  const el = document.getElementById(id);
  if (!el) return;
  if (!entries.length) { el.innerHTML = '<div style="color:var(--text-muted);text-align:center;padding:20px;">暂无</div>'; return; }

  el.innerHTML = entries.map(l => {
    const css = typeof cssOrFn === "function" ? cssOrFn(l) : cssOrFn;
    const t = l.time || "";
    const source = (l.source || "").toUpperCase();
    const method = l.method || "";
    const ep = escHtml(l.endpoint || "");
    const st = l.status !== undefined ? l.status : "";

    // 请求体
    const reqObj = l.request;
    const reqStr = reqObj ? (typeof reqObj === "object" ? JSON.stringify(reqObj) : String(reqObj)) : "";
    const reqJson = reqStr ? jsonHighlight(JSON.stringify(reqObj, null, 2)) : "";

    // 响应体
    const respObj = l.response;
    let respStr = "";
    if (respObj) {
      if (typeof respObj === "object") {
        respStr = JSON.stringify(respObj);
      } else {
        respStr = String(respObj);
      }
    }
    const respJson = respStr ? (() => {
      try { return jsonHighlight(JSON.stringify(JSON.parse(respStr), null, 2)); }
      catch(e) { return escHtml(respStr); }
    })() : "";

    return '<div class="bubble ' + css + '">' +
      '<div class="bubble-head">' +
        '<span class="bubble-time">' + t + '</span>' +
        '<span class="bubble-tag ' + css + '">' + source + '</span>' +
        '<span class="bubble-method">' + method + '</span>' +
        '<span class="bubble-ep">' + ep + '</span>' +
        '<span class="bubble-status">' + st + '</span>' +
      '</div>' +
      '<div class="bubble-body">' +
        (reqJson ? '<div class="bubble-section"><div class="bubble-label">📤 请求</div><div class="bubble-json">' + reqJson + '</div></div>' : '') +
        (respJson ? '<div class="bubble-section"><div class="bubble-label">📥 响应</div><div class="bubble-json">' + respJson + '</div></div>' : '') +
      '</div>' +
    '</div>';
  }).join("");
}

function scrollAllBottom() {
  ["rcsPanel","acsPanel","sysPanel"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.scrollTop = el.scrollHeight;
  });
}

(function() { init(); })();
</script>
</body>
</html>
