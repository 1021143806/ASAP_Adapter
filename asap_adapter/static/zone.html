<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>区域管控 — ASAP Adapter</title>
<link rel="stylesheet" href="/static/common.css">
</head>
<body>
  <div id="jsErrorBar" style="display:none;background:var(--danger);color:#fff;padding:8px 16px;font-size:12px;text-align:center;position:sticky;top:0;z-index:9999;" onclick="this.style.display='none'"></div>

<div class="app-container">
  <!-- ══ 导航栏 ══ -->
  <header class="header">
    <div style="display:flex;align-items:center;gap:16px;">
      <h1>📡 ASAP Adapter</h1>
      <nav style="display:flex;gap:4px;">
        <a href="/" class="nav-tab">🚪 风淋门</a>
        <a href="/zone" class="nav-tab nav-tab-active">📡 区域管控</a>
        <a href="/config" class="nav-tab">⚙ 配置</a>
        <a href="/upgrade" class="nav-tab">⬆ 升级</a>
        <a href="/sim" class="nav-tab">🎮 模拟器</a>
      </nav>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="header-badge">
        <span class="status-dot online" id="connDot"></span>
        <span id="connStatus">已连接</span>
      </div>
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>
    </div>
  </header>

  <!-- ══ 区域管控视图 ══ -->
  <div class="dashboard">
    <!-- 区域信息 -->
    <div class="glass zone-info">
      <div class="card-title">📡 区域状态</div>
      <div class="zone-row">
        <span class="zone-label">区域ID</span>
        <span class="zone-value unknown" id="zoneId">--</span>
      </div>
      <div class="zone-row">
        <span class="zone-label">占用状态</span>
        <span class="zone-value unknown" id="zoneStatus">--</span>
      </div>
      <div class="zone-row">
        <span class="zone-label">被占用者</span>
        <span class="zone-value unknown" id="zoneOccupiedBy">--</span>
      </div>
      <div class="zone-row">
        <span class="zone-label">当前AGV</span>
        <span class="zone-value unknown" id="currentAgv">--</span>
      </div>
      <div class="zone-row">
        <span class="zone-label">上次查询</span>
        <span class="zone-value unknown" id="zoneLastCheck">等待中...</span>
      </div>
      <button class="btn" onclick="fetchZoneStatus()" style="margin-top:8px;">🔄 刷新</button>
    </div>

    <!-- 流程状态 + 门卡 -->
    <div class="glass">
      <div class="card-title">流程状态 <span id="zoneFlowState" style="font-size:12px;color:var(--text-muted);">空闲</span></div>
      <div class="door-card" id="zoneEntryDoor">
        <div class="door-name"><span class="door-icon">🚪</span>区域门 <span style="font-size:10px;color:var(--text-muted);" id="zoneEntryDoorId">(q001)</span></div>
        <div class="door-status-value closed" id="zoneEntryDoorStatus">关</div>
        <div class="door-status-text" id="zoneEntryDoorText">已关闭</div>
        <div class="door-controls" style="margin-top:8px;">
          <button class="btn btn-success" onclick="zoneForceDoor('q001','1')">🔓 强制开</button>
          <button class="btn btn-danger" onclick="zoneForceDoor('q001','2')">🔒 强制关</button>
        </div>
      </div>
    </div>

    <!-- 步骤日志 -->
    <div class="glass log-panel-full">
      <div class="card-title">📦 步骤报文</div>
      <div id="zoneStepLog" style="max-height:300px;overflow-y:auto;font-size:11px;font-family:'SF Mono','Fira Code',monospace;">
        <div style="color:var(--text-muted);padding:10px;text-align:center;">暂无记录</div>
      </div>
    </div>
  </div>
</div>

<script>
window.onerror = function(msg, url, line) {
  const bar = document.getElementById("jsErrorBar");
  if (bar) { bar.textContent = "⚠ " + msg + " (行" + line + ")"; bar.style.display = "block"; }
};

// ══ 初始化 ══
let sseConnected = false;

function init() {
  fetchZoneStatus();
}, 500);
}

function jsonHighlight(s) {
  let html = (s || "").replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  return html
    .replace(/"([^"]+)":/g, '<span style="color:var(--accent);">"$1"</span>:')
    .replace(/: "([^"]*)"/g, ': <span style="color:var(--success);">"$1"</span>')
    .replace(/: (\d+\.?\d*)/g, ': <span style="color:var(--warning);">$1</span>')
    .replace(/: (true|false)/g, ': <span style="color:#f0a060;">$1</span>')
    .replace(/: (null)/g, ': <span style="color:var(--text-muted);">$1</span>');
}

// ══ 主题 ══
function toggleTheme() {
  const html = document.documentElement;
  const current = html.getAttribute("data-theme");
  const next = current === "dark" ? "light" : "dark";
  html.setAttribute("data-theme", next);
  localStorage.setItem("theme", next);
  document.querySelector(".theme-toggle").textContent = next === "dark" ? "🌙" : "☀️";
}

(function() {
  const saved = localStorage.getItem("theme");
  if (saved) document.documentElement.setAttribute("data-theme", saved);
  document.querySelector(".theme-toggle").textContent = (saved || "dark") === "dark" ? "🌙" : "☀️";
  init();
})();
</script>
</body>
</html>
