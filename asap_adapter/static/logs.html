<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>系统日志 — ASAP Adapter</title>
<link rel="stylesheet" href="/static/common.css">
<script src="/static/common.js"></script>
<style>
  /* 覆盖 dashboard grid */
  .logs-dash > * { grid-column: 1 / -1; }
  .logs-dash > .log-grid { grid-column: 1 / -1; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .logs-dash > .log-grid > * { min-width: 0; }

  .log-panel { background: var(--card-bg); backdrop-filter: blur(20px); border: 1px solid var(--card-border); border-radius: 14px; padding: 14px; display: flex; flex-direction: column; }
  .log-panel-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-shrink: 0; }
  .log-panel-body { flex: 1; overflow-y: auto; min-height: 300px; max-height: 450px; }

  /* ── 气泡卡片 ── */
  .bubble { margin: 6px 0; border-radius: 10px; overflow: hidden; }
  .bubble-head { display: flex; align-items: center; gap: 8px; padding: 5px 10px; font-size: 12px; cursor: pointer; }
  .bubble-expand { font-size: 9px; opacity: .4; min-width: 16px; text-align: center; transition: transform .2s; }
  .bubble.open .bubble-expand { transform: rotate(180deg); }
  .bubble-time { font-size: 10px; opacity: .6; white-space: nowrap; min-width: 80px; }
  .bubble-tag { font-size: 10px; padding: 2px 8px; border-radius: 8px; font-weight: 600; }
  .bubble-method { font-size: 10px; opacity: .6; font-family: monospace; min-width: 36px; }
  .bubble-ep { font-size: 11px; font-weight: 500; word-break: break-all; flex: 1; }
  .bubble-status { font-size: 10px; opacity: .6; }
  .bubble-body { padding: 0 10px 8px; display: none; flex-direction: column; gap: 4px; }
  .bubble.open .bubble-body { display: flex; }
  .bubble-section { padding: 5px 8px; border-radius: 6px; }
  .bubble-label { font-size: 9px; text-transform: uppercase; opacity: .4; margin-bottom: 2px; }
  .bubble-json { font-size: 10px; font-family: 'SF Mono','Fira Code',monospace; white-space: pre-wrap; word-break: break-all; line-height: 1.5; }

  /* ── 着色: 按接口细分 ── */
  .bubble.rcs-ctl { background: rgba(255,107,53,.05); border: 1px solid rgba(255,107,53,.12); }
  .bubble.rcs-ctl .bubble-head { background: rgba(255,107,53,.07); }
  .bubble-tag.rcs-ctl { background: rgba(255,107,53,.3); color: #ff6b35; }
  .bubble.rcs-ctl .bubble-section { background: rgba(255,107,53,.05); }

  .bubble.rcs-qry { background: rgba(240,160,48,.05); border: 1px solid rgba(240,160,48,.12); }
  .bubble.rcs-qry .bubble-head { background: rgba(240,160,48,.07); }
  .bubble-tag.rcs-qry { background: rgba(240,160,48,.3); color: #f0a030; }
  .bubble.rcs-qry .bubble-section { background: rgba(240,160,48,.05); }

  .bubble.acs-ctl { background: rgba(74,144,255,.05); border: 1px solid rgba(74,144,255,.12); }
  .bubble.acs-ctl .bubble-head { background: rgba(74,144,255,.07); }
  .bubble-tag.acs-ctl { background: rgba(74,144,255,.3); color: #4a90ff; }
  .bubble.acs-ctl .bubble-section { background: rgba(74,144,255,.05); }

  .bubble.acs-qry { background: rgba(96,165,250,.05); border: 1px solid rgba(96,165,250,.12); }
  .bubble.acs-qry .bubble-head { background: rgba(96,165,250,.07); }
  .bubble-tag.acs-qry { background: rgba(96,165,250,.3); color: #60a5fa; }
  .bubble.acs-qry .bubble-section { background: rgba(96,165,250,.05); }

  .bubble.zone-in { background: rgba(34,197,94,.05); border: 1px solid rgba(34,197,94,.12); }
  .bubble.zone-in .bubble-head { background: rgba(34,197,94,.07); }
  .bubble-tag.zone-in { background: rgba(34,197,94,.3); color: #22c55e; }
  .bubble.zone-in .bubble-section { background: rgba(34,197,94,.05); }

  .bubble.zone-out { background: rgba(168,85,247,.05); border: 1px solid rgba(168,85,247,.12); }
  .bubble.zone-out .bubble-head { background: rgba(168,85,247,.07); }
  .bubble-tag.zone-out { background: rgba(168,85,247,.3); color: #a855f7; }
  .bubble.zone-out .bubble-section { background: rgba(168,85,247,.05); }

  .bubble.zone-st { background: rgba(6,182,212,.05); border: 1px solid rgba(6,182,212,.12); }
  .bubble.zone-st .bubble-head { background: rgba(6,182,212,.07); }
  .bubble-tag.zone-st { background: rgba(6,182,212,.3); color: #06b6d4; }
  .bubble.zone-st .bubble-section { background: rgba(6,182,212,.05); }

  .bubble.sys { background: rgba(150,150,150,.04); border: 1px solid rgba(150,150,150,.08); }
  .bubble.sys .bubble-head { background: rgba(150,150,150,.04); }
  .bubble-tag.sys { background: rgba(150,150,150,.15); color: #999; }
  .bubble.sys .bubble-section { background: rgba(150,150,150,.03); }

  .empty { text-align: center; padding: 30px; color: var(--text-muted); font-size: 12px; }
</style>
</head>
<body>
<div id="jsErrorBar" style="display:none;background:var(--danger);color:#fff;padding:8px 16px;font-size:12px;text-align:center;position:sticky;top:0;z-index:9999;" onclick="this.style.display='none'"></div>

<div class="app-container">
  <header class="header">
    <div style="display:flex;align-items:center;gap:16px;">
      <h1>📋 ASAP Adapter</h1>
      <nav style="display:flex;gap:4px;">
        <a href="/" class="nav-tab">🚪 风淋门</a><a href="/zone" class="nav-tab">📡 区域管控</a>
        <a href="/config" class="nav-tab">⚙ 配置</a><a href="/upgrade" class="nav-tab">⬆ 升级</a>
        <a href="/sim" class="nav-tab">🎮 模拟器</a><a href="/logs" class="nav-tab nav-tab-active">📋 日志</a>
      </nav>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <span style="font-size:9px;display:flex;gap:8px;align-items:center;">
        <span style="color:#ff6b35;">■ 控制</span><span style="color:#f0a030;">■ 查询</span>
        <span style="color:#4a90ff;">■ ACS控</span><span style="color:#60a5fa;">■ ACS查</span>
        <span style="color:#22c55e;">■ 进入</span><span style="color:#a855f7;">■ 退出</span><span style="color:#06b6d4;">■ 状态</span>
      </span>
      <span style="font-size:10px;color:var(--text-muted);" id="logTotal">--</span>
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>
    </div>
  </header>

  <div class="dashboard logs-dash">

    <!-- ══ 上排: RCS (左) + ACS+Zone (右) ══ -->
    <div class="log-grid">
      <div class="log-panel">
        <div class="log-panel-head">
          <span style="font-size:13px;font-weight:600;color:#ff8c00;">🔺 RCS 上游</span>
          <span style="font-size:9px;color:var(--text-muted);" id="rcsCount">0</span>
        </div>
        <div class="log-panel-body" id="rcsPanel"></div>
      </div>

      <div class="log-panel">
        <div class="log-panel-head">
          <span style="font-size:13px;font-weight:600;color:#4a90ff;">🔻 ACS / Zone 下游</span>
          <span style="font-size:9px;color:var(--text-muted);" id="acsCount">0</span>
        </div>
        <div class="log-panel-body" id="acsPanel"></div>
      </div>
    </div>

    <!-- ══ 下排: System ══ -->
    <div class="log-panel">
      <div class="log-panel-head">
        <span style="font-size:13px;font-weight:600;color:#999;">⚙ System 内部</span>
        <span style="font-size:9px;color:var(--text-muted);" id="sysCount">0</span>
      </div>
      <div class="log-panel-body" id="sysPanel" style="max-height:200px;"></div>
    </div>

  </div>
</div>

<script>
let _all = [];

function init() { initTheme(); initNav("/logs"); setInterval(poll, 2000); poll(); }

async function poll() {
  try {
    const r = await fetch("/api/asap/logs?limit=200&source=all");
    const d = await r.json();
    _all = d.logs || [];
    document.getElementById("logTotal").textContent = "共" + d.total + "条";
    render();
  } catch (e) {}
}

function render() {
  const rcs = [], acs = [], sys = [];
  _all.forEach(l => {
    if (l.source === "rcs") rcs.push(l);
    else if (l.source === "acs" || l.source === "zone") acs.push(l);
    else sys.push(l);
  });
  renderPanel("rcsPanel", rcs);  document.getElementById("rcsCount").textContent = rcs.length + "条";
  renderPanel("acsPanel", acs);  document.getElementById("acsCount").textContent = acs.length + "条";
  renderPanel("sysPanel", sys);  document.getElementById("sysCount").textContent = sys.length + "条";
}

// 按 source + endpoint 细分颜色
function bubbleClass(l) {
  const s = l.source, m = l.method || "", ep = l.endpoint || "";
  if (s === "rcs") {
    const req = l.request || {};
    return (req.status === 1 || req.status === 2 || req.status === "1" || req.status === "2") ? "rcs-ctl" : "rcs-qry";
  }
  if (s === "acs") return m === "POST" ? "acs-ctl" : "acs-qry";
  if (s === "zone") {
    if (ep.includes("enter")) return "zone-in";
    if (ep.includes("exit")) return "zone-out";
    if (ep.includes("status")) return "zone-st";
    return "zone-in";
  }
  return "sys";
}

function renderPanel(id, entries) {
  const el = document.getElementById(id);
  if (!el) return;
  if (!entries.length) { el.innerHTML = '<div class="empty">暂无</div>'; return; }

  el.innerHTML = entries.map(l => {
    const cls = bubbleClass(l);
    const t = l.time || "";
    const ep = escHtml(l.endpoint || "");

    const reqObj = l.request;
    const reqJson = reqObj ? jsonHighlight(JSON.stringify(reqObj, null, 2)) : "";

    const respObj = l.response;
    let respStr = respObj ? (typeof respObj === "object" ? JSON.stringify(respObj) : String(respObj)) : "";
    const respJson = respStr ? (() => {
      try { return jsonHighlight(JSON.stringify(JSON.parse(respStr), null, 2)); } catch(e){ return escHtml(respStr); }
    })() : "";

    return '<div class="bubble ' + cls + '" onclick="this.classList.toggle(\'open\')">' +
      '<div class="bubble-head">' +
        '<span class="bubble-expand">▼</span>' +
        '<span class="bubble-time">' + t + '</span>' +
        '<span class="bubble-tag ' + cls + '">' + (l.source || "SYS").toUpperCase() + '</span>' +
        '<span class="bubble-method">' + (l.method || "") + '</span>' +
        '<span class="bubble-ep">' + ep + '</span>' +
        '<span class="bubble-status">' + (l.status !== undefined ? l.status : "") + '</span>' +
      '</div>' +
      (reqJson || respJson ? '<div class="bubble-body">' +
        (reqJson ? '<div class="bubble-section"><div class="bubble-label">📤 请求</div><div class="bubble-json">' + reqJson + '</div></div>' : '') +
        (respJson ? '<div class="bubble-section"><div class="bubble-label">📥 响应</div><div class="bubble-json">' + respJson + '</div></div>' : '') +
      '</div>' : '') +
    '</div>';
  }).join("");

  el.scrollTop = el.scrollHeight;
}

(function() { init(); })();
</script>
</body>
</html>
