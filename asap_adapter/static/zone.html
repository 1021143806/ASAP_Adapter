<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>区域管控 — ASAP Adapter</title>
<link rel="stylesheet" href="/static/common.css">
<script src="/static/common.js"></script>
</head>
<body>
  <div id="jsErrorBar" style="display:none;background:var(--danger);color:#fff;padding:8px 16px;font-size:12px;text-align:center;position:sticky;top:0;z-index:9999;" onclick="this.style.display='none'"></div>

<div class="app-container">
  <!-- ══ 导航栏 ══ -->
  <header class="header">
    <div style="display:flex;align-items:center;gap:16px;">
      <h1>📡 ASAP Adapter</h1>
      <nav style="display:flex;gap:4px;">
        <a href="/" class="nav-tab">🚪 风淋门</a>
        <a href="/zone" class="nav-tab nav-tab-active">📡 区域管控</a>
        <a href="/config" class="nav-tab">⚙ 配置</a>
        <a href="/upgrade" class="nav-tab">⬆ 升级</a>
        <a href="/sim" class="nav-tab">🎮 模拟器</a>
        <a href="/logs" class="nav-tab">📋 日志</a>
      </nav>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="header-badge">
        <span class="status-dot online" id="connDot"></span>
        <span id="connStatus">已连接</span>
      </div>
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>
    </div>
  </header>

  <!-- ══ 区域管控视图 ══ -->
  <div class="dashboard">
    <!-- 区域信息 -->
    <div class="glass zone-info">
      <div class="card-title">📡 区域状态</div>
      <div class="zone-row">
        <span class="zone-label">区域ID</span>
        <span class="zone-value unknown" id="zoneId">--</span>
      </div>
      <div class="zone-row">
        <span class="zone-label">占用状态</span>
        <span class="zone-value unknown" id="zoneStatus">--</span>
      </div>
      <div class="zone-row">
        <span class="zone-label">被占用者</span>
        <span class="zone-value unknown" id="zoneOccupiedBy">--</span>
      </div>
      <div class="zone-row">
        <span class="zone-label">当前AGV</span>
        <span class="zone-value unknown" id="currentAgv">--</span>
      </div>
      <div class="zone-row">
        <span class="zone-label">上次查询</span>
        <span class="zone-value unknown" id="zoneLastCheck">等待中...</span>
      </div>
      <button class="btn" onclick="fetchZoneStatus()" style="margin-top:8px;">🔄 刷新</button>
    </div>

    <!-- 流程状态 + 门卡 -->
    <div class="glass">
      <div class="card-title">流程状态 <span id="zoneFlowState" style="font-size:12px;color:var(--text-muted);">空闲</span></div>
      <div class="door-card" id="zoneEntryDoor">
        <div class="door-name"><span class="door-icon">🚪</span>区域门 <span style="font-size:10px;color:var(--text-muted);" id="zoneEntryDoorId">(q001)</span></div>
        <div class="door-status-value closed" id="zoneEntryDoorStatus">关</div>
        <div class="door-status-text" id="zoneEntryDoorText">已关闭</div>
        <div class="door-controls" style="margin-top:8px;">
          <button class="btn btn-success" onclick="zoneForceDoor('q001','1')">🔓 强制开</button>
          <button class="btn btn-danger" onclick="zoneForceDoor('q001','2')">🔒 强制关</button>
        </div>
      </div>
    </div>

    <!-- 统一请求日志 -->
    <div class="glass log-panel-full">
      <div class="card-title" style="display:flex;justify-content:space-between;align-items:center;">
        <span>📋 请求日志 <span id="zoneLogCount" style="font-size:10px;color:var(--text-muted);font-weight:400;"></span></span>
        <div style="display:flex;gap:8px;align-items:center;">
          <label style="font-size:10px;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;gap:4px;">
            <input type="checkbox" id="zoneAutoScroll" checked> 自动滚动
          </label>
          <button class="btn btn-sm" onclick="document.getElementById('zoneLogContainer').scrollTop=document.getElementById('zoneLogContainer').scrollHeight" style="font-size:9px;padding:2px 6px;">⬇ 滚到底</button>
        </div>
      </div>
      <div id="zoneLogContainer" style="max-height:300px;overflow-y:auto;font-size:11px;font-family:'SF Mono','Fira Code',monospace;line-height:1.6;">
        <div style="color:var(--text-muted);padding:10px;text-align:center;">等待请求...</div>
      </div>
    </div>
  </div>
</div>

<script>
// ══ 区域管控页面 — v3.3 重建 ══
let _pollLogsTimer = null;
let _pollStatusTimer = null;

function init() {
  initTheme();
  initNav("/zone");
  fetchZoneStatus();
  _pollStatusTimer = setInterval(fetchZoneStatus, 3000);
  _pollLogsTimer = pollLogs("zoneLogContainer", "zoneLogCount", "zoneAutoScroll", { limit: 50 });
}

async function fetchZoneStatus() {
  try {
    const resp = await fetch("/api/asap/zone-status");
    const data = await resp.json();
    updateZoneDashboard(data);
  } catch (e) { console.error("获取区域状态失败:", e); }
}

function updateZoneDashboard(data) {
  setText("zoneId", data.zone_id || "--");
  setText("currentAgv", data.current_agv || "--");

  // 区域占用状态
  const statusEl = document.getElementById("zoneStatus");
  const occupiedByEl = document.getElementById("zoneOccupiedBy");
  const zoneStatus = data.zone_status || "unknown";

  if (statusEl) {
    if (zoneStatus === "occupied" || zoneStatus === "granted") {
      statusEl.textContent = "已占用";
      statusEl.className = "zone-value occupied";
    } else if (zoneStatus === "available") {
      statusEl.textContent = "空闲";
      statusEl.className = "zone-value available";
    } else {
      statusEl.textContent = zoneStatus || "未知";
      statusEl.className = "zone-value unknown";
    }
  }
  if (occupiedByEl) {
    occupiedByEl.textContent = data.zone_occupied_by || (zoneStatus === "occupied" ? "(占用)" : "--");
    occupiedByEl.className = data.zone_occupied_by ? "zone-value occupied" : "zone-value unknown";
  }

  // 门状态
  const doorStatus = data.door_status || "2";
  const doorStatusEl = document.getElementById("zoneEntryDoorStatus");
  const doorTextEl = document.getElementById("zoneEntryDoorText");
  const doorCard = document.getElementById("zoneEntryDoor");
  if (doorStatusEl) {
    if (doorStatus === "1") { doorStatusEl.textContent = "开"; doorStatusEl.className = "door-status-value open"; }
    else { doorStatusEl.textContent = "关"; doorStatusEl.className = "door-status-value closed"; }
  }
  if (doorTextEl) {
    doorTextEl.textContent = doorStatus === "1" ? "已打开" : "已关闭";
  }
  if (doorCard) {
    doorCard.className = "door-card " + (doorStatus === "1" ? "tag-open" : "tag-closed");
  }

  // 流程状态
  setText("zoneFlowState", (data.state || "空闲").toUpperCase());
  setText("zoneLastCheck", data.last_check ? data.last_check.slice(0, 19) : "从未");
}

function setText(id, value) {
  const el = document.getElementById(id);
  if (el) el.textContent = value || "--";
}

async function zoneForceDoor(doorCode, status) {
  try {
    const resp = await fetch("/api/asap/zone/force-door", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ door_code: doorCode, status: status }),
    });
    const data = await resp.json();
    console.log("force-door:", data);
    setTimeout(fetchZoneStatus, 500);
  } catch (e) { console.error("强制门操作失败:", e); }
}

// ══ 启动 ══
(function() { init(); })();
</script>
</body>
</html>
