<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>风淋门 — ASAP Adapter</title>
<link rel="stylesheet" href="/static/common.css">
</head>
<body>
  <div id="jsErrorBar" style="display:none;background:var(--danger);color:#fff;padding:8px 16px;font-size:12px;text-align:center;position:sticky;top:0;z-index:9999;" onclick="this.style.display='none'"></div>

<div class="app-container">
  <!-- ══ 导航栏 ══ -->
  <header class="header">
    <div style="display:flex;align-items:center;gap:16px;">
      <h1>🚪 ASAP Adapter</h1>
      <nav style="display:flex;gap:4px;">
        <a href="/" class="nav-tab nav-tab-active">🚪 风淋门</a>
        <a href="/zone" class="nav-tab">📡 区域管控</a>
        <a href="/config" class="nav-tab">⚙ 配置</a>
        <a href="/upgrade" class="nav-tab">⬆ 升级</a>
        <a href="/sim" class="nav-tab">🎮 模拟器</a>
      </nav>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="header-badge">
        <span class="status-dot online" id="connDot"></span>
        <span id="connStatus">已连接</span>
      </div>
      <button id="simToggleBtn" class="btn btn-success btn-sm" onclick="toggleSimMode()" style="font-size:10px;padding:3px 8px;">🔌 模拟器</button>
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>
    </div>
  </header>

  <!-- ══ 风淋门视图 ══ -->
  <div class="dashboard">

    <!-- 方向状态 -->
    <div class="glass state-machine">
      <div class="card-title">📐 通行方向 <span id="directionLabel" style="font-size:11px;color:var(--text-muted);">未判定</span></div>
      <div style="margin-top:6px;font-size:13px;color:var(--text-muted);">
        规则: 1001先开=出, 1002先开=进 · 两门全关后重置
      </div>
    </div>

    <!-- 门状态 -->
    <div class="glass door-panel">
      <div class="card-title">🚪 门状态 <span id="doorCodeMapping" style="font-size:10px;font-weight:400;color:var(--text-muted);"></span></div>
      <div class="door-cards" id="doorCards">
        <div class="door-card" id="door1Card">
          <div class="door-name"><span class="door-icon">🚪</span>门1 <span style="font-size:10px;color:var(--text-muted);font-weight:400;" id="door1Id">(DOOR01)</span></div>
          <div class="door-code" id="door1Code">1001</div>
          <div class="door-rcs-status" id="door1RcsStatus"></div>
          <div class="door-status-value closed" id="door1DoorStatus">--</div>
          <div class="door-status-text" id="door1DoorText">未知</div>
          <div class="door-controls">
            <button class="btn btn-success" onclick="manualOpen(doorIds.door1)" disabled>开门</button>
            <button class="btn btn-warning" onclick="manualClose(doorIds.door1)" disabled>关门</button>
          </div>
        </div>
        <div class="door-card" id="door2Card">
          <div class="door-name"><span class="door-icon">🚪</span>门2 <span style="font-size:10px;color:var(--text-muted);font-weight:400;" id="door2Id">(DOOR02)</span></div>
          <div class="door-code" id="door2Code">1002</div>
          <div class="door-rcs-status" id="door2RcsStatus"></div>
          <div class="door-status-value closed" id="door2DoorStatus">--</div>
          <div class="door-status-text" id="door2DoorText">未知</div>
          <div class="door-controls">
            <button class="btn btn-success" onclick="manualOpen(doorIds.door2)" disabled>开门</button>
            <button class="btn btn-warning" onclick="manualClose(doorIds.door2)" disabled>关门</button>
          </div>
        </div>
      </div>
    </div>

    <!-- RCS 请求日志 -->
    <div class="glass log-panel-full">
      <div class="card-title" style="display:flex;justify-content:space-between;align-items:center;">
        <span>📋 RCS 请求日志 <span id="rcsReqCount" style="font-size:10px;color:var(--text-muted);font-weight:400;"></span></span>
        <button class="btn" onclick="loadRcsLogs()" style="font-size:10px;padding:3px 8px;">🔄 刷新</button>
      </div>
      <div id="rcsLogContainer" style="max-height:300px;overflow-y:auto;font-size:11px;font-family:'SF Mono','Fira Code',monospace;line-height:1.6;">
        <div style="color:var(--text-muted);padding:10px;text-align:center;">等待 RCS 请求...</div>
      </div>
      <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:4px;">
        <label style="font-size:10px;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;gap:4px;">
          <input type="checkbox" id="rcsAutoScroll" checked onchange="rcsAutoScroll=this.checked"> 自动滚动
        </label>
        <button class="btn btn-sm" onclick="document.getElementById('rcsLogContainer').scrollTop=document.getElementById('rcsLogContainer').scrollHeight" style="font-size:9px;padding:2px 6px;">⬇ 滚到底</button>
      </div>
    </div>
  </div>

  <!-- 事件日志 -->
  <div class="glass log-panel log-panel-full">
    <div class="card-title" style="display:flex;justify-content:space-between;">
      <span>📋 事件日志</span>
      <button class="btn" onclick="clearLog()" style="font-size:10px;padding:3px 8px;">清除</button>
    </div>
    <div class="log-container" id="logContainer"></div>
  </div>
</div>

<script>
// ══ 全局JS错误展示 ══
window.onerror = function(msg, url, line) {
  const bar = document.getElementById("jsErrorBar");
  if (bar) { bar.textContent = "⚠ JS错误: " + msg + " (行" + line + ") — 点击关闭"; bar.style.display = "block"; }
  console.error(msg, url, line);
};
window.addEventListener('unhandledrejection', function(e) {
  const bar = document.getElementById("jsErrorBar");
  if (bar) { bar.textContent = "⚠ 异步错误: " + (e.reason?.message || e.reason) + " — 点击关闭"; bar.style.display = "block"; }
  console.error('Unhandled rejection:', e.reason);
});

// ══ 状态变量 ══
let sseConnected = false;
let doorIds = { door1: "DOOR01", door2: "DOOR02" };
let simEnabled = false;
let rcsAutoScroll = true;
let rcsLogEntries = [];

// ══ 初始化 ══
function init() {
  const safe = (fn, name) => { try { fn(); } catch(e) { console.error('[Init] '+name+' 失败:', e); } };
  safe(loadRcsLogs, 'loadRcsLogs');
  setInterval(loadRcsLogs, 3000);
  safe(refreshDoorStatus, 'refreshDoorStatus');
  setInterval(refreshDoorStatus, 3000);
  safe(checkSimStatus, 'checkSimStatus');
  setInterval(checkSimStatus, 5000);
  safe(connectSSE, 'connectSSE');
}

// ══ 模拟器状态 ══
async function checkSimStatus() {
  try {
    const r = await fetch("/api/asap/sim/status");
    const d = await r.json();
    simEnabled = d.enabled;
    const btn = document.getElementById("simToggleBtn");
    if (btn) {
      btn.textContent = simEnabled ? "🔌 已启用" : "🔌 未启用";
      btn.className = "btn btn-sm " + (simEnabled ? "btn-success" : "btn-warning");
    }
  } catch(e) {}
}
async function toggleSimMode() {
  if (simEnabled) {
    await fetch("/api/asap/sim/disable", {method:"POST"});
  } else {
    await fetch("/api/asap/sim/enable", {method:"POST"});
  }
  await checkSimStatus();
}

// ══ 门状态刷新 ══
async function refreshDoorStatus() {
  try {
    const resp = await fetch("/api/asap/refresh-doors", { method: "POST" });
    const data = await resp.json();
    if (data.door1) { doorIds.door1 = data.door1.door_id || "DOOR01"; updateDoorCard("door1", data.door1); }
    if (data.door2) { doorIds.door2 = data.door2.door_id || "DOOR02"; updateDoorCard("door2", data.door2); }
  } catch (e) { console.error("[DoorStatus] 请求失败:", e); }
}

function updateDoorCard(pos, door) {
  const acsStatus = door.acs_status || door.door_status || "?";
  const rcsStatus = door.rcs_status;
  const card = document.getElementById(pos + "Card");
  const statusEl = document.getElementById(pos + "DoorStatus");
  const textEl = document.getElementById(pos + "DoorText");
  const codeEl = document.getElementById(pos + "Code");
  const rcsEl = document.getElementById(pos + "RcsStatus");
  if (codeEl) codeEl.textContent = door.door_code || (pos === "door1" ? "1001" : "1002");
  const idEl = document.getElementById(pos + "Id");
  if (idEl) idEl.textContent = "(" + (door.door_id || pos.toUpperCase()) + ")";
  if (rcsEl) {
    const r = rcsStatus !== undefined ? rcsStatus : (acsStatus === "1" ? 1 : acsStatus === "0" ? 2 : 0);
    const labels = { 0: "离线/故障", 1: "开", 2: "关" };
    rcsEl.textContent = "status: " + r + " (" + (labels[r] || "?") + ")";
  }
  const d1Code = document.getElementById("door1Code");
  const d2Code = document.getElementById("door2Code");
  if (d1Code && d2Code) {
    document.getElementById("doorCodeMapping").textContent = "门1:" + d1Code.textContent + " | 门2:" + d2Code.textContent;
  }
  if (card) card.className = "door-card";
  let statusText, valueText, cls;
  if (acsStatus === "1") { cls = "open"; statusText = "已打开"; valueText = "开"; }
  else if (acsStatus === "0") { cls = "closed"; statusText = "已关闭"; valueText = "关"; }
  else if (acsStatus === "2") { cls = "fault"; statusText = "故障"; valueText = "故"; }
  else { cls = ""; statusText = "未知"; valueText = "?"; }
  if (card) card.classList.add(cls);
  if (statusEl) { statusEl.textContent = valueText; statusEl.className = "door-status-value " + cls; }
  if (textEl) textEl.textContent = statusText;
}

// ══ 状态查询 ══
async function fetchStatus() {
  try {
    const resp = await fetch("/api/asap/status");
    const data = await resp.json();
    updateDashboard(data);
  } catch (e) { console.error("获取状态失败:", e); }
}

function updateDashboard(data) {
  if (data.door1) updateDoorCard("door1", data.door1);
  if (data.door2) updateDoorCard("door2", data.door2);
  const dirEl = document.getElementById("directionLabel");
  if (dirEl && data.direction_label) {
    dirEl.textContent = data.direction_label || "未判定";
    dirEl.style.color = data.direction ? "var(--accent)" : "var(--text-muted)";
  }
}

// ══ 手动控制 ══
async function manualOpen(doorId) {
  try {
    await fetch("/api/asap/manual/open?door_id=" + doorId, { method: "POST" });
    await fetchStatus();
  } catch (e) { console.error("开门失败:", e); }
}
async function manualClose(doorId) {
  try {
    await fetch("/api/asap/manual/close?door_id=" + doorId, { method: "POST" });
    await fetchStatus();
  } catch (e) { console.error("关门失败:", e); }
}

// ══ RCS 请求日志 ══
async function loadRcsLogs() {
  try {
    const resp = await fetch("/api/asap/request-log?limit=50");
    const data = await resp.json();
    const container = document.getElementById("rcsLogContainer");
    if (!container) return;
    const count = document.getElementById("rcsReqCount");
    if (count) count.textContent = "(共" + data.total + "条)";
    if (!data.logs || data.logs.length === 0) {
      container.innerHTML = '<div style="color:var(--text-muted);padding:10px;text-align:center;">无请求记录</div>';
      rcsLogEntries = [];
      return;
    }
    // 判断是否有新条目
    const oldLen = rcsLogEntries.length;
    if (data.logs.length > oldLen) {
      const newEntries = data.logs.slice(oldLen);
      rcsLogEntries = data.logs;
      newEntries.reverse().forEach(l => {
        const div = document.createElement("div");
        div.style.cssText = "margin:4px 0;padding:6px 8px;background:var(--card-bg);border-radius:6px;border-left:3px solid " +
          (l.category === "control" ? "var(--warning)" : "var(--accent)");
        const time = l.time || "";
        const reqJson = JSON.stringify(l.request || {}, null, 2);
        const respJson = typeof l.response === "string" ? l.response : JSON.stringify(l.response || {}, null, 2);
        const methodPath = (l.method && l.endpoint) ? ' <span style="font-size:9px;color:var(--text-muted);font-family:monospace;">' + escHtml(l.method) + ' ' + escHtml(l.endpoint) + '</span>' : '';
        div.innerHTML =
          '<div style="display:flex;justify-content:space-between;cursor:pointer;" onclick="var d=this.nextElementSibling;d.style.display=d.style.display===\'none\'?\'block\':\'none\'">' +
            '<span><span style="font-size:10px;color:var(--text-muted);">' + time + '</span> ' +
            '<span style="font-size:10px;color:' + (l.category === "control" ? "var(--warning)" : "var(--accent)") + ';">' +
            (l.category || "") + '</span>' + methodPath + ' ' +
            '<span style="font-size:11px;">' + escHtml(JSON.stringify(l.request)) + '</span></span>' +
            '<span style="font-size:10px;color:var(--text-muted);">' + (l.status || "") + ' ▼</span>' +
          '</div>' +
          '<div style="display:none;margin-top:4px;font-size:10px;">' +
            '<div style="color:var(--warning);">📤 请求:</div>' +
            '<pre style="background:rgba(0,0,0,0.2);padding:4px 8px;border-radius:4px;max-height:120px;overflow:auto;margin:2px 0;">' + escHtml(reqJson) + '</pre>' +
            '<div style="color:var(--success);">📥 响应:</div>' +
            '<pre style="background:rgba(0,0,0,0.2);padding:4px 8px;border-radius:4px;max-height:120px;overflow:auto;margin:2px 0;">' + escHtml(respJson) + '</pre>' +
          '</div>';
        container.appendChild(div);
      });
      // 自动滚动
      if (rcsAutoScroll) container.scrollTop = container.scrollHeight;
      // 限制最多200条DOM
      while (container.children.length > 200) container.removeChild(container.firstChild);
    }
  } catch (e) { console.error("RCS日志加载失败:", e); }
}

function escHtml(s) { const d = document.createElement("div"); d.textContent = s || ""; return d.innerHTML; }

// ══ SSE 事件流 ══
function connectSSE() {
  if (sseConnected) return;
  try {
    const es = new EventSource("/api/sse/events");
    es.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);
        if (msg.event_type === "air_shower_snapshot" && msg.data) updateDashboard(msg.data);
        else if (msg.event_type === "snapshot" && msg.data) updateDashboard(msg.data);
        else if (msg.event_type !== "heartbeat") addLog(msg);
      } catch (err) {}
    };
    es.onerror = () => { sseConnected = false; es.close(); };
    es.onopen = () => { sseConnected = true; };
  } catch (e) {
    sseConnected = false;
    fetchStatus();
    setInterval(fetchStatus, 3000);
  }
}

// ══ 事件日志 ══
function addLog(entry) {
  const container = document.getElementById("logContainer");
  if (!container) return;
  const time = new Date().toLocaleTimeString();
  const div = document.createElement("div");
  div.className = "log-entry";
  div.innerHTML = '<span class="time">' + time + '</span>' + JSON.stringify(entry);
  container.appendChild(div);
  while (container.children.length > 200) container.removeChild(container.firstChild);
}
function clearLog() {
  const container = document.getElementById("logContainer");
  if (container) container.innerHTML = "";
}

// ══ 主题切换 ══
function toggleTheme() {
  const html = document.documentElement;
  const current = html.getAttribute("data-theme");
  const next = current === "dark" ? "light" : "dark";
  html.setAttribute("data-theme", next);
  localStorage.setItem("theme", next);
  document.querySelector(".theme-toggle").textContent = next === "dark" ? "🌙" : "☀️";
}

// ══ 启动 ══
(function() {
  const saved = localStorage.getItem("theme");
  if (saved) document.documentElement.setAttribute("data-theme", saved);
  document.querySelector(".theme-toggle").textContent = (saved || "dark") === "dark" ? "🌙" : "☀️";
  init();
})();
</script>
</body>
</html>
