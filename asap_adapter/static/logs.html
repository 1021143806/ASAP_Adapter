<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>系统日志 — ASAP Adapter</title>
<link rel="stylesheet" href="/static/common.css">
<script src="/static/common.js"></script>
<style>
  .log-container { min-height: 60vh; overflow-y: auto; }

  /* 覆盖 common.css 的 dashboard grid */
  .logs-dash { display: flex !important; flex-direction: column; gap: 12px; }

  /* ── 筛选tab ── */
  .filter-bar { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
  .filter-tab { padding: 5px 14px; border-radius: 14px; font-size: 12px; cursor: pointer; border: 1px solid transparent; background: var(--card-bg); color: var(--text-secondary); transition: all .2s; }
  .filter-tab:hover { border-color: var(--accent); }
  .filter-tab.on { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* ── 气泡卡片 ── */
  .bubble { margin: 8px 0; border-radius: 12px; overflow: hidden; }
  .bubble-head { display: flex; align-items: center; gap: 10px; padding: 8px 14px; font-size: 13px; }
  .bubble-time { font-size: 11px; opacity: .7; white-space: nowrap; min-width: 85px; }
  .bubble-tag { font-size: 11px; padding: 3px 10px; border-radius: 10px; font-weight: 600; letter-spacing: .5px; }
  .bubble-method { font-size: 11px; opacity: .7; font-family: monospace; min-width: 40px; }
  .bubble-ep { font-size: 12px; font-weight: 500; word-break: break-all; }
  .bubble-status { font-size: 11px; margin-left: auto; opacity: .7; min-width: 30px; text-align: right; }

  /* ── 请求/响应上下堆叠 ── */
  .bubble-body { display: flex; flex-direction: column; gap: 6px; padding: 0 14px 10px; }
  .bubble-section { padding: 8px 10px; border-radius: 8px; }
  .bubble-label { font-size: 10px; text-transform: uppercase; opacity: .5; margin-bottom: 4px; }
  .bubble-json { font-size: 11px; font-family: 'SF Mono','Fira Code',monospace; white-space: pre-wrap; word-break: break-all; line-height: 1.6; max-height: 500px; overflow-y: auto; }

  /* ── 着色 ── */
  .bubble.rcs { background: rgba(255,140,0,.06); border: 1px solid rgba(255,140,0,.15); }
  .bubble.rcs .bubble-head { background: rgba(255,140,0,.08); }
  .bubble-tag.rcs { background: rgba(255,140,0,.35); color: #ff8c00; }
  .bubble.rcs .bubble-section { background: rgba(255,140,0,.06); }

  .bubble.acs { background: rgba(70,130,255,.06); border: 1px solid rgba(70,130,255,.15); }
  .bubble.acs .bubble-head { background: rgba(70,130,255,.08); }
  .bubble-tag.acs { background: rgba(70,130,255,.35); color: #4a90ff; }
  .bubble.acs .bubble-section { background: rgba(70,130,255,.06); }

  .bubble.zone { background: rgba(0,200,120,.06); border: 1px solid rgba(0,200,120,.15); }
  .bubble.zone .bubble-head { background: rgba(0,200,120,.08); }
  .bubble-tag.zone { background: rgba(0,200,120,.35); color: #00c878; }
  .bubble.zone .bubble-section { background: rgba(0,200,120,.06); }

  .bubble.system { background: rgba(150,150,150,.04); border: 1px solid rgba(150,150,150,.1); }
  .bubble.system .bubble-head { background: rgba(150,150,150,.05); }
  .bubble-tag.system { background: rgba(150,150,150,.2); color: #999; }
  .bubble.system .bubble-section { background: rgba(150,150,150,.04); }

  .no-data { text-align: center; padding: 40px; color: var(--text-muted); }
</style>
</head>
<body>
<div id="jsErrorBar" style="display:none;background:var(--danger);color:#fff;padding:8px 16px;font-size:12px;text-align:center;position:sticky;top:0;z-index:9999;" onclick="this.style.display='none'"></div>

<div class="app-container">
  <header class="header">
    <div style="display:flex;align-items:center;gap:16px;">
      <h1>📋 ASAP Adapter</h1>
      <nav style="display:flex;gap:4px;">
        <a href="/" class="nav-tab">🚪 风淋门</a>
        <a href="/zone" class="nav-tab">📡 区域管控</a>
        <a href="/config" class="nav-tab">⚙ 配置</a>
        <a href="/upgrade" class="nav-tab">⬆ 升级</a>
        <a href="/sim" class="nav-tab">🎮 模拟器</a>
        <a href="/logs" class="nav-tab nav-tab-active">📋 日志</a>
      </nav>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>
  </header>

  <div class="dashboard logs-dash">
    <!-- ══ 筛选栏 ══ -->
    <div class="glass" style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;">
      <div class="filter-bar" id="filterBar">
        <span class="filter-tab on" data-src="all">全部</span>
        <span class="filter-tab" data-src="rcs">🟠 RCS</span>
        <span class="filter-tab" data-src="acs">🔵 ACS</span>
        <span class="filter-tab" data-src="zone">🟢 Zone</span>
        <span class="filter-tab" data-src="system">⚪ System</span>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <span style="font-size:10px;color:var(--text-muted);" id="logCount">0条</span>
        <label style="font-size:10px;cursor:pointer;display:flex;align-items:center;gap:4px;">
          <input type="checkbox" id="logAutoScroll" checked> 自动滚
        </label>
        <button class="btn btn-sm" onclick="poll();document.getElementById('logList').scrollTop=document.getElementById('logList').scrollHeight;">⬇ 底部</button>
      </div>
    </div>

    <!-- ══ 日志流 ══ -->
    <div class="log-container" id="logList">
      <div class="no-data">等待数据...</div>
    </div>
  </div>
</div>

<script>
let _all = [];
let _filter = "all";

function init() { initTheme(); initNav("/logs"); setInterval(poll, 2000); poll(); }

// ── 筛选 ──
document.getElementById("filterBar").addEventListener("click", e => {
  const t = e.target.closest(".filter-tab");
  if (!t) return;
  document.querySelectorAll(".filter-tab").forEach(el => el.classList.remove("on"));
  t.classList.add("on");
  _filter = t.dataset.src;
  render();
});

async function poll() {
  try {
    const r = await fetch("/api/asap/logs?limit=200&source=all");
    const d = await r.json();
    _all = d.logs || [];
    render();
  } catch (e) { console.error(e); }
}

function render() {
  let logs = _all;
  if (_filter !== "all") logs = _all.filter(l => {
    if (_filter === "rcs") return l.source === "rcs";
    if (_filter === "acs") return l.source === "acs" || l.source === "zone";
    return l.source === _filter;
  });

  const el = document.getElementById("logList");
  document.getElementById("logCount").textContent = logs.length + "条";

  if (!logs.length) {
    el.innerHTML = '<div class="no-data">无匹配日志</div>';
    return;
  }

  el.innerHTML = logs.map(l => {
    const src = l.source || "system";
    const t = l.time || "";
    const method = l.method || "";
    const ep = escHtml(l.endpoint || "");
    const st = l.status !== undefined ? l.status : "";

    const reqObj = l.request;
    const reqJson = reqObj ? jsonHighlight(JSON.stringify(reqObj, null, 2)) : "";

    const respObj = l.response;
    let respStr = "";
    if (respObj) respStr = typeof respObj === "object" ? JSON.stringify(respObj) : String(respObj);
    const respJson = respStr ? (() => {
      try { return jsonHighlight(JSON.stringify(JSON.parse(respStr), null, 2)); }
      catch(e) { return escHtml(respStr); }
    })() : "";

    const hasReq = reqJson.length > 0;
    const hasResp = respJson.length > 0;

    return '<div class="bubble ' + src + '">' +
      '<div class="bubble-head">' +
        '<span class="bubble-time">' + t + '</span>' +
        '<span class="bubble-tag ' + src + '">' + (l.source || "SYS").toUpperCase() + '</span>' +
        '<span class="bubble-method">' + method + '</span>' +
        '<span class="bubble-ep">' + ep + '</span>' +
        '<span class="bubble-status">' + st + '</span>' +
      '</div>' +
      (hasReq || hasResp ? '<div class="bubble-body">' +
        (hasReq ? '<div class="bubble-section"><div class="bubble-label">📤 请求</div><div class="bubble-json">' + reqJson + '</div></div>' : '') +
        (hasResp ? '<div class="bubble-section"><div class="bubble-label">📥 响应</div><div class="bubble-json">' + respJson + '</div></div>' : '') +
      '</div>' : '') +
    '</div>';
  }).join("");

  if (document.getElementById("logAutoScroll")?.checked) {
    el.scrollTop = el.scrollHeight;
  }
}

(function() { init(); })();
</script>
</body>
</html>
