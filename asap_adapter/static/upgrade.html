<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>升级管理 — ASAP Adapter</title>
<link rel="stylesheet" href="/static/common.css">
</head>
<body>
  <div id="jsErrorBar" style="display:none;background:var(--danger);color:#fff;padding:8px 16px;font-size:12px;text-align:center;position:sticky;top:0;z-index:9999;" onclick="this.style.display='none'"></div>

<div class="app-container">
  <!-- ══ 导航栏 ══ -->
  <header class="header">
    <div style="display:flex;align-items:center;gap:16px;">
      <h1>⬆ ASAP Adapter</h1>
      <nav style="display:flex;gap:4px;">
        <a href="/" class="nav-tab">🚪 风淋门</a>
        <a href="/zone" class="nav-tab">📡 区域管控</a>
        <a href="/config" class="nav-tab">⚙ 配置</a>
        <a href="/upgrade" class="nav-tab nav-tab-active">⬆ 升级</a>
        <a href="/sim" class="nav-tab">🎮 模拟器</a>
      </nav>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>
  </header>

  <div class="upgrade-grid">

    <!-- 当前版本 -->
    <div class="glass">
      <div class="card-title">当前版本</div>
      <div style="display:flex;gap:24px;flex-wrap:wrap;">
        <div>
          <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px;">应用版本</div>
          <div style="font-size:18px;font-weight:600;font-family:monospace;" id="upgradeAppVersion">加载中...</div>
        </div>
        <div>
          <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px;">项目路径</div>
          <div style="font-size:13px;font-family:monospace;" id="upgradeProjectDir">加载中...</div>
        </div>
      </div>
    </div>

    <!-- 上传升级 -->
    <div class="glass">
      <div class="card-title">📦 上传升级包</div>
      <div class="upload-zone" id="upgradeUploadZone">
        <div class="upload-icon">📦</div>
        <div><strong>点击选择或拖拽 .zip 文件到此处</strong></div>
        <div class="hint">仅支持 .zip 格式</div>
        <input type="file" id="upgradeFileInput" accept=".zip" title="选择升级包文件(.zip)">
      </div>
      <div class="file-info" id="upgradeFileInfo">
        <span>📦</span>
        <span class="name" id="upgradeFileName"></span>
        <span class="size" id="upgradeFileSize"></span>
        <button class="btn btn-sm" id="upgradeBtnClearFile">✕</button>
      </div>
      <button class="btn btn-success" id="upgradeBtnUpload" disabled style="margin-top:10px;">⬆ 开始升级</button>
      <div class="progress-bar" id="upgradeProgressBar"><div class="bar"></div></div>
      <div class="result-box" id="upgradeResultBox"></div>
      <div class="exclude-tags" id="upgradeExcludeTags"></div>
    </div>

    <!-- 升级记录 -->
    <div class="glass">
      <div class="card-title">📋 升级记录</div>
      <div id="upgradeRecordsContainer"><div style="padding:20px;text-align:center;color:var(--text-muted);">加载中...</div></div>
    </div>
  </div>
</div>

<script>
window.onerror = function(msg, url, line) {
  const bar = document.getElementById("jsErrorBar");
  if (bar) { bar.textContent = "⚠ " + msg + " (行" + line + ")"; bar.style.display = "block"; }
};

function init() {
  loadUpgradeVersion();
  loadUpgradeRecords();
  upgradeInitUpload();
}

// ══ 版本信息 ══
async function loadUpgradeVersion() {
  try {
    const resp = await fetch("/api/asap/upgrade/version");
    const data = await resp.json();
    const el = document.getElementById("upgradeAppVersion");
    if (!el) return;
    if (data.success) {
      el.textContent = data.info.app_version || "unknown";
      const dirEl = document.getElementById("upgradeProjectDir");
      if (dirEl && data.info.project_dir) dirEl.textContent = data.info.project_dir;
    }
  } catch (e) { console.error(e); }
}

// ══ 升级记录 ══
async function loadUpgradeRecords() {
  try {
    const resp = await fetch("/api/asap/upgrade/records");
    const data = await resp.json();
    const container = document.getElementById("upgradeRecordsContainer");
    if (!container) return;
    if (!data.success) { container.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted);">加载失败</div>'; return; }
    const records = data.records || [];
    if (records.length === 0) {
      container.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted);">暂无升级记录</div>';
      return;
    }
    container.innerHTML = '<table class="record-table"><thead><tr><th>时间</th><th>版本</th><th>说明</th><th>备份</th></tr></thead><tbody>' +
      records.map(r => '<tr><td>' + (r.time || "") + '</td><td><span class="version-tag">' + (r.title || r.version || "-") + '</span></td><td>' + (r.changes || []).join(", ") + '</td><td>' + (r.backup || "-") + '</td></tr>').join("") + '</tbody></table>';
  } catch (e) { console.error(e); }
}

// ══ 文件上传 ══
let upgradeSelectedFile = null;

function upgradeFormatSize(bytes) {
  if (bytes < 1024) return bytes + " B";
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
  return (bytes / (1024 * 1024)).toFixed(1) + " MB";
}

function upgradeInitUpload() {
  const fileInput = document.getElementById("upgradeFileInput");
  const uploadZone = document.getElementById("upgradeUploadZone");
  const fileInfo = document.getElementById("upgradeFileInfo");
  const btnClear = document.getElementById("upgradeBtnClearFile");
  if (!fileInput || !uploadZone) return;

  const showFile = (file) => {
    upgradeSelectedFile = file;
    document.getElementById("upgradeFileName").textContent = file.name;
    document.getElementById("upgradeFileSize").textContent = upgradeFormatSize(file.size);
    fileInfo.classList.add("show");
    document.getElementById("upgradeBtnUpload").disabled = false;
  };
  const clearFile = () => {
    upgradeSelectedFile = null;
    fileInput.value = "";
    fileInfo.classList.remove("show");
    document.getElementById("upgradeBtnUpload").disabled = true;
  };

  fileInput.addEventListener("change", () => { if (fileInput.files[0]) showFile(fileInput.files[0]); });
  btnClear.addEventListener("click", clearFile);

  uploadZone.addEventListener("dragover", (e) => { e.preventDefault(); uploadZone.classList.add("dragover"); });
  uploadZone.addEventListener("dragleave", () => uploadZone.classList.remove("dragover"));
  uploadZone.addEventListener("drop", (e) => {
    e.preventDefault();
    uploadZone.classList.remove("dragover");
    if (e.dataTransfer.files[0]) showFile(e.dataTransfer.files[0]);
  });

  document.getElementById("upgradeBtnUpload").addEventListener("click", async () => {
    if (!upgradeSelectedFile) return;
    const formData = new FormData();
    formData.append("file", upgradeSelectedFile);
    const progressBar = document.getElementById("upgradeProgressBar");
    const resultBox = document.getElementById("upgradeResultBox");
    progressBar.classList.add("show");
    resultBox.className = "result-box";
    resultBox.textContent = "";
    try {
      const resp = await fetch("/api/asap/upgrade/upload", { method: "POST", body: formData });
      const data = await resp.json();
      progressBar.classList.remove("show");
      resultBox.classList.add("show");
      if (data.success) {
        resultBox.classList.add("success");
        resultBox.textContent = data.message || "升级成功，系统即将重启...";
        setTimeout(() => { location.reload(); }, 5000);
      } else {
        resultBox.classList.add("error");
        resultBox.textContent = data.detail || data.error || "升级失败";
      }
    } catch (e) {
      progressBar.classList.remove("show");
      resultBox.classList.add("show", "error");
      resultBox.textContent = "请求失败: " + e.message;
    }
  });
}

// ══ 主题 ══
function toggleTheme() {
  const html = document.documentElement;
  const next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
  html.setAttribute("data-theme", next);
  localStorage.setItem("theme", next);
  document.querySelector(".theme-toggle").textContent = next === "dark" ? "🌙" : "☀️";
}

(function() {
  const saved = localStorage.getItem("theme");
  if (saved) document.documentElement.setAttribute("data-theme", saved);
  document.querySelector(".theme-toggle").textContent = (saved || "dark") === "dark" ? "🌙" : "☀️";
  init();
})();
</script>
</body>
</html>
