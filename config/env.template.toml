# ASAP Adapter 配置模板
# 复制为 env.toml 并按实际环境修改

[server]
host = "0.0.0.0"
port = 5012
reload = false                      # 开发时设为 true 自动重载

[log]
level = "INFO"                      # DEBUG | INFO | WARNING | ERROR
file = "logs/asap.log"
rotation = "5 MB"
backup_count = 3

[angel]
# Angel 风淋门协议 - 底层物理门控接口
# 调试时指向内置模拟器: http://127.0.0.1:5012/sim
# 生产时指向真实风淋门控制器
base_url = "http://127.0.0.1:5012/sim"
outer_door_id = "DOOR01"
inner_door_id = "DOOR02"
poll_interval = 1.0                 # 轮询门状态间隔(秒)
poll_timeout = 30.0                 # 轮询超时(秒)，超时触发异常

[zone]
# 区域管控 API
# 调试时指向模拟器: http://127.0.0.1:5012/sim/api/zones/*
enter_url = "http://127.0.0.1:5012/sim/api/zones/enter"
exit_url = "http://127.0.0.1:5012/sim/api/zones/exit"
status_url = "http://127.0.0.1:5012/sim/api/zones/status"
zone_id = "zone_001"
client_id = "asap_adapter_01"
retry_interval = 3.0                # 区域被占用时重试间隔(秒)
max_retries = 10                    # 最大重试次数，超限返回失败
exit_retry_interval = 1.0           # 释放区域重试间隔(秒)
exit_max_retries = 30               # 释放区域最大重试次数

[air_shower]
duration = 4.0                      # 风淋等待时长(秒)
agv_enter_timeout = 30.0            # 等待AGV进入超时(秒)
agv_exit_timeout = 30.0             # 等待AGV驶离超时(秒)

[rcs]
# RCS/WDCS 系统对接
change_status_url = "http://rcs-host/changeDoorStatus"
report_interval = 0.5               # 状态上报最小间隔(秒)

# RCS 门编码映射 (ASAP door ID → RCS door code)
door_code_mapping = {DOOR01 = "1001", DOOR02 = "1002"}

[sim]
# 内置模拟器配置
auto_open_delay = 2.0
auto_close_delay = 2.0
zone_always_busy = false
zone_id = "zone_001"
